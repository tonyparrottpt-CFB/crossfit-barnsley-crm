<!-- ══════════════════════════════════════════════════════════ APP ═══ -->
<script>
// ── database (inlined from db.js) ─────────────────────────────────────────
const DB_NAME = 'cfb_crm';
const DB_VERSION = 2;
let _db = null;

function openDB() {
  if (_db) return Promise.resolve(_db);
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains('members')) {
        const m = db.createObjectStore('members', { keyPath: 'id', autoIncrement: true });
        m.createIndex('status', 'status'); m.createIndex('email', 'email', { unique: true });
      }
      if (!db.objectStoreNames.contains('leads')) {
        const l = db.createObjectStore('leads', { keyPath: 'id', autoIncrement: true });
        l.createIndex('status', 'status'); l.createIndex('createdAt', 'createdAt'); l.createIndex('followUpDate', 'followUpDate');
      }
      if (!db.objectStoreNames.contains('leadActivities')) {
        const la = db.createObjectStore('leadActivities', { keyPath: 'id', autoIncrement: true });
        la.createIndex('leadId', 'leadId'); la.createIndex('createdAt', 'createdAt');
      }
      if (!db.objectStoreNames.contains('checkins')) {
        const c = db.createObjectStore('checkins', { keyPath: 'id', autoIncrement: true });
        c.createIndex('memberId', 'memberId'); c.createIndex('checkedInAt', 'checkedInAt');
      }
      if (!db.objectStoreNames.contains('notes')) {
        const n = db.createObjectStore('notes', { keyPath: 'id', autoIncrement: true });
        n.createIndex('memberId', 'memberId');
      }
    };
    req.onsuccess = (e) => { _db = e.target.result; resolve(_db); };
    req.onerror  = (e) => reject(e.target.error);
  });
}

function _tx(store, mode = 'readonly') { return _db.transaction(store, mode).objectStore(store); }
function _all(store) { return new Promise((res, rej) => { const r = _tx(store).getAll(); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
function _get(store, id) { return new Promise((res, rej) => { const r = _tx(store).get(id); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
function _put(store, record) { return new Promise((res, rej) => { const r = _tx(store, 'readwrite').put(record); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
function _del(store, id) { return new Promise((res, rej) => { const r = _tx(store, 'readwrite').delete(id); r.onsuccess = () => res(); r.onerror = () => rej(r.error); }); }
function _byIndex(store, index, value) { return new Promise((res, rej) => { const r = _tx(store).index(index).getAll(value); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }

const Members       = { list: () => _all('members'), get: id => _get('members', id), save: m => _put('members', { ...m, createdAt: m.createdAt ?? new Date().toISOString() }), delete: id => _del('members', id) };
const Leads         = { list: () => _all('leads'),   get: id => _get('leads', id),   save: l => _put('leads',   { ...l, createdAt: l.createdAt ?? new Date().toISOString() }), delete: id => _del('leads', id) };
const LeadActivities = { forLead: leadId => _byIndex('leadActivities', 'leadId', leadId), add: (leadId, type, content) => _put('leadActivities', { leadId, type, content, createdAt: new Date().toISOString() }), delete: id => _del('leadActivities', id) };
const Checkins      = { list: () => _all('checkins'), forMember: memberId => _byIndex('checkins', 'memberId', memberId), add: memberId => _put('checkins', { memberId, checkedInAt: new Date().toISOString() }), delete: id => _del('checkins', id) };
const Notes         = { forMember: memberId => _byIndex('notes', 'memberId', memberId), add: (memberId, content) => _put('notes', { memberId, content, createdAt: new Date().toISOString() }), delete: id => _del('notes', id) };

async function seedIfEmpty() {
  const existing = await Members.list();
  if (existing.length > 0) return;
  const today = new Date();
  const dft = d => new Date(today.getTime() + d * 86400000).toISOString().slice(0, 10);
  const mems = [
    { name: 'Sarah Thornton',  phone: '07700900001', email: 'sarah.thornton@email.com',  membershipType: 'Monthly Unlimited', status: 'active',   joinedDate: '2024-01-10' },
    { name: 'James Pickering', phone: '07700900002', email: 'james.pickering@email.com', membershipType: 'Monthly Unlimited', status: 'active',   joinedDate: '2024-03-05' },
    { name: 'Emma Walsh',      phone: '07700900003', email: 'emma.walsh@email.com',      membershipType: 'Annual',            status: 'active',   joinedDate: '2023-09-01' },
    { name: 'Dan Hartley',     phone: '07700900004', email: 'dan.hartley@email.com',     membershipType: 'Pay Per Class',     status: 'inactive', joinedDate: '2023-11-20' },
    { name: 'Priya Sharma',    phone: '07700900005', email: 'priya.sharma@email.com',    membershipType: 'Annual',            status: 'active',   joinedDate: '2024-02-14' },
  ];
  const leds = [
    { name: 'Tom Bates',    phone: '07700900010', email: 'tom.bates@email.com',    source: 'Social Media', status: 'new',       followUpDate: dft(1),  notes: 'Saw our Instagram post' },
    { name: 'Lucy Pearce',  phone: '07700900011', email: 'lucy.pearce@email.com',  source: 'Referral',     status: 'contacted', followUpDate: dft(-1), notes: 'Referred by Sarah Thornton' },
    { name: 'Marcus Webb',  phone: '07700900012', email: 'marcus.webb@email.com',  source: 'Walk-in',      status: 'converted', followUpDate: '',      notes: 'Signed up for monthly' },
    { name: 'Jade Holroyd', phone: '07700900013', email: 'jade.holroyd@email.com', source: 'Website',      status: 'lost',      followUpDate: '',      notes: 'No response after follow-up' },
    { name: 'Ryan Moss',    phone: '07700900014', email: 'ryan.moss@email.com',    source: 'Referral',     status: 'contacted', followUpDate: dft(0),  notes: 'Friend of James Pickering' },
  ];
  for (const m of mems) await Members.save(m);
  for (const l of leds) await Leads.save(l);
  const savedLeads = await Leads.list();
  const lucy  = savedLeads.find(l => l.name === 'Lucy Pearce');
  const ryan  = savedLeads.find(l => l.name === 'Ryan Moss');
  const marcus = savedLeads.find(l => l.name === 'Marcus Webb');
  if (lucy)  { await _put('leadActivities', { leadId: lucy.id,   type: 'Call',    content: 'Left voicemail. Will try again tomorrow.',                                   createdAt: new Date(Date.now() - 3*86400000).toISOString() }); await _put('leadActivities', { leadId: lucy.id, type: 'WhatsApp', content: 'Sent intro message with class schedule.', createdAt: new Date(Date.now() - 86400000).toISOString() }); }
  if (ryan)  { await _put('leadActivities', { leadId: ryan.id,   type: 'Call',    content: 'Spoke briefly — interested in morning classes. Calling back today.',          createdAt: new Date(Date.now() - 2*86400000).toISOString() }); }
  if (marcus){ await _put('leadActivities', { leadId: marcus.id, type: 'Meeting', content: 'Came in for a trial class. Loved it — signed up on the spot.',                createdAt: new Date(Date.now() - 5*86400000).toISOString() }); }
  const saved = await Members.list();
  const now = Date.now(), day = 86400000;
  const ciDays = { 'Sarah Thornton': [1,3,5,8,10,12], 'James Pickering': [2,4,7,9], 'Emma Walsh': [1,2,3,4,5,6,8,9,10,11,12,13], 'Priya Sharma': [20,25] };
  for (const m of saved) for (const d of (ciDays[m.name] ?? [])) await _put('checkins', { memberId: m.id, checkedInAt: new Date(now - d*day).toISOString() });
  const sarah = saved.find(m => m.name === 'Sarah Thornton');
  if (sarah) await Notes.add(sarah.id, 'Competing in local throwdown next month. Adjust programming accordingly.');
}

// ── boot ──────────────────────────────────────────────────────────────────
(async () => {
  await openDB();
  await seedIfEmpty();
  render();
})();

// ── routing ───────────────────────────────────────────────────────────────
const pages = { dashboard, members, leads, checkins };
let currentPage = 'dashboard';

document.getElementById('sidebar-nav').addEventListener('click', (e) => {
  const link = e.target.closest('[data-page]');
  if (!link) return;
  e.preventDefault();
  navigate(link.dataset.page);
});

// ── Mobile sidebar toggle ─────────────────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar').classList.remove('-translate-x-full');
  document.getElementById('sidebar-backdrop').classList.remove('hidden');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.add('-translate-x-full');
  document.getElementById('sidebar-backdrop').classList.add('hidden');
}
document.getElementById('btn-mobile-menu').addEventListener('click', openSidebar);
document.getElementById('sidebar-backdrop').addEventListener('click', closeSidebar);
document.getElementById('sidebar-nav').querySelectorAll('[data-page]').forEach(link => {
  link.addEventListener('click', closeSidebar);
});

document.getElementById('btn-open-settings').addEventListener('click', () => {
  settingsModal();
  let pendingRestore = null;

  document.getElementById('btn-backup').addEventListener('click', async () => {
    await backupAll();
    showToast('Backup downloaded');
  });

  document.getElementById('restore-file').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        const counts = [
          `${(data.members ?? []).length} members`,
          `${(data.leads ?? []).length} leads`,
          `${(data.leadActivities ?? []).length} activities`,
          `${(data.checkins ?? []).length} check-ins`,
          `${(data.notes ?? []).length} notes`,
        ];
        const backed = data.exportedAt ? `Backed up ${new Date(data.exportedAt).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}` : 'Unknown date';
        document.getElementById('restore-preview').innerHTML =
          `<div class="font-medium mb-1">${backed}</div>` +
          counts.map(c => `<div>• ${c}</div>`).join('');
        document.getElementById('restore-preview').classList.remove('hidden');
        document.getElementById('btn-restore').classList.remove('hidden');
        pendingRestore = ev.target.result;
      } catch {
        showToast('Could not read file — make sure it is a CFB backup');
      }
    };
    reader.readAsText(file);
  });

  document.getElementById('btn-restore').addEventListener('click', async () => {
    if (!pendingRestore) return;
    if (!confirm('This will replace ALL current data with the backup. Are you sure?')) return;
    await restoreAll(pendingRestore);
    showToast('Data restored successfully');
    closeModal();
    render();
  });

  document.getElementById('btn-clear-all').addEventListener('click', async () => {
    if (!confirm('This will delete ALL data and reload demo data. Are you sure?')) return;
    const stores = ['members','leads','leadActivities','checkins','notes'];
    await Promise.all(stores.map(s => new Promise((res, rej) => {
      const r = _db.transaction(s, 'readwrite').objectStore(s).clear();
      r.onsuccess = res; r.onerror = rej;
    })));
    await seedIfEmpty();
    showToast('Data cleared — demo data loaded');
    closeModal();
    render();
  });

  // WhatsApp templates — save
  document.getElementById('btn-save-templates')?.addEventListener('click', () => {
    const tmpls = {
      message1:     document.getElementById('tmpl-message1').value.trim(),
      message2:     document.getElementById('tmpl-message2').value.trim(),
      last_message: document.getElementById('tmpl-last_message').value.trim(),
    };
    localStorage.setItem(TEMPLATES_KEY, JSON.stringify(tmpls));
    showToast('✓ Templates saved');
  });

  // Sheet URL — save
  document.getElementById('btn-save-sheet-url')?.addEventListener('click', () => {
    const url = document.getElementById('sheet-url-input').value.trim();
    if (url) {
      localStorage.setItem(SHEET_URL_KEY, url);
      document.getElementById('btn-sync-now').disabled = false;
      document.getElementById('sheet-url-status').textContent = '✓ URL saved — use "Sync Now" or the Sync button on the Leads page.';
      showToast('Sheet URL saved');
    } else {
      localStorage.removeItem(SHEET_URL_KEY);
      document.getElementById('btn-sync-now').disabled = true;
      document.getElementById('sheet-url-status').textContent = 'No URL saved yet.';
      showToast('Sheet URL cleared');
    }
  });

  // Sheet URL — sync now
  document.getElementById('btn-sync-now')?.addEventListener('click', async () => {
    const url = localStorage.getItem(SHEET_URL_KEY);
    if (!url) return;
    const btn = document.getElementById('btn-sync-now');
    btn.textContent = 'Syncing…';
    btn.disabled = true;
    await syncLeadsFromUrl(url);
    btn.textContent = 'Sync Now';
    btn.disabled = false;
    closeModal();
  });

  document.getElementById('btn-modal-close').addEventListener('click', closeModal);
});

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  render();
}

async function render() {
  const el = document.getElementById('page-content');
  el.innerHTML = '<div class="flex items-center justify-center h-32 text-gray-400"><div class="animate-pulse">Loading…</div></div>';
  el.innerHTML = await pages[currentPage]();
  attachHandlers(currentPage);
  updateSidebarBadge();
}

async function updateSidebarBadge() {
  const badge       = document.getElementById('leads-overdue-badge');
  const mobileBadge = document.getElementById('leads-overdue-badge-mobile');
  if (!badge) return;
  const todayStr = new Date().toISOString().slice(0, 10);
  const leads = await Leads.list();
  const count = leads.filter(l =>
    l.status !== 'converted' && l.status !== 'lost' &&
    l.followUpDate && l.followUpDate < todayStr
  ).length;
  if (count > 0) {
    badge.textContent = count;
    badge.classList.remove('hidden');
    if (mobileBadge) { mobileBadge.textContent = count; mobileBadge.classList.remove('hidden'); }
  } else {
    badge.classList.add('hidden');
    if (mobileBadge) mobileBadge.classList.add('hidden');
  }
}

// ── helpers ───────────────────────────────────────────────────────────────
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' }); }
function fmtDateTime(iso) { if (!iso) return '—'; return new Date(iso).toLocaleString('en-GB', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }); }
function daysSince(iso) { if (!iso) return Infinity; return Math.floor((Date.now() - new Date(iso).getTime()) / 86400000); }

function statusBadge(status) {
  const map = {
    active:    'bg-green-100 text-green-800',

// ── CSV import ────────────────────────────────────────────────────────────

function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuote = false;
  const src = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n') + '\n';
  for (let i = 0; i < src.length; i++) {
    const c = src[i];
    if (inQuote) {
      if (c === '"' && src[i + 1] === '"') { field += '"'; i++; }
      else if (c === '"') inQuote = false;
      else field += c;
    } else {
      if      (c === '"')  inQuote = true;
      else if (c === ',')  { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); field = ''; if (row.some(f => f.trim())) rows.push(row); row = []; }
      else field += c;
    }
  }
  if (rows.length === 0) return { headers: [], rows: [] };
  const headers = rows[0].map(h => h.trim());
  const dataRows = rows.slice(1)
    .filter(r => r.some(f => f.trim()))
    .map(r => Object.fromEntries(headers.map((h, i) => [h, (r[i] ?? '').trim()])));
  return { headers, rows: dataRows };
}

function detectLeadColumns(headers) {
  const norm = h => h.toLowerCase().replace(/[\s_\-()]/g, '');
  const match = (...patterns) => headers.find(h => patterns.includes(norm(h))) ?? null;
  return {
    name:   match('name','fullname','contactname','contact','leadname','firstname','person'),
    email:  match('email','emailaddress','mail','emailaddr'),
    phone:  match('phone','phonenumber','telephone','mobile','mob','cell','number','tel'),
    source: match('source','leadsource','channel','referredby','referralsource','where','howdidyouhear'),
    status: match('status','leadstatus','stage'),
    notes:  match('notes','note','comments','comment','description','details','info'),
  };
}

// ── CSV export ────────────────────────────────────────────────────────────
function toCSV(rows, columns) {
  const header = columns.map(c => `"${c.label}"`).join(',');
  const body = rows.map(row =>
    columns.map(c => {
      const val = String(c.get(row) ?? '').replace(/"/g, '""');
      return `"${val}"`;
    }).join(',')
  );
  return [header, ...body].join('\r\n');
}

function downloadCSV(filename, csv) {
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  a.click();
  URL.revokeObjectURL(url);
}

function waLink(phone) {
  if (!phone) return null;
  let num = phone.replace(/[\s\-\(\)\+]/g, '');
  if (num.startsWith('0')) num = '44' + num.slice(1);
  return `whatsapp://send?phone=${num}`;
}

const TAG_COLORS = [
  'bg-red-100 text-red-700', 'bg-orange-100 text-orange-700',
  'bg-yellow-100 text-yellow-800', 'bg-green-100 text-green-700',
  'bg-blue-100 text-blue-700', 'bg-violet-100 text-violet-700',
  'bg-pink-100 text-pink-700', 'bg-indigo-100 text-indigo-700',

function tagColor(tag) {
  let h = 0;
  for (const c of tag) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;

}

const LEAD_COLS = ['new','message1','message2','last_message','contacted','trial_booked','trial_attended','nurture','converted','lost'];
const LEAD_COL_META = {
  new:            { label: 'New',            color: 'bg-yellow-50 border-yellow-200',   badge: 'bg-yellow-100 text-yellow-800' },
  message1:       { label: 'Message 1',      color: 'bg-violet-50 border-violet-200',   badge: 'bg-violet-100 text-violet-800' },
  message2:       { label: 'Message 2',      color: 'bg-purple-50 border-purple-200',   badge: 'bg-purple-100 text-purple-800' },
  last_message:   { label: 'Last Message',   color: 'bg-rose-50 border-rose-200',       badge: 'bg-rose-100 text-rose-700' },
  contacted:      { label: 'Contacted',      color: 'bg-orange-50 border-orange-200',   badge: 'bg-orange-100 text-orange-800' },
  trial_booked:   { label: 'Trial Booked',   color: 'bg-blue-50 border-blue-200',       badge: 'bg-blue-100 text-blue-800' },
  trial_attended: { label: 'Trial Attended', color: 'bg-cyan-50 border-cyan-200',       badge: 'bg-cyan-100 text-cyan-800' },
  nurture:        { label: 'Nurture',        color: 'bg-amber-50 border-amber-200',     badge: 'bg-amber-100 text-amber-800' },
  converted:      { label: 'Converted',      color: 'bg-green-50 border-green-200',     badge: 'bg-green-100 text-green-800' },
  lost:           { label: 'Lost',           color: 'bg-gray-50 border-gray-200',       badge: 'bg-gray-100 text-gray-600' },
};

function renderKanban(list) {
  return LEAD_COLS.map((col, colIdx) => {
    const group = list.filter(l => l.status === col).sort((a, b) => (b.createdAt ?? '').localeCompare(a.createdAt ?? ''));
    const { label, color, badge } = LEAD_COL_META[col];
    const prevCol = LEAD_COLS[colIdx - 1] ?? null;
    const nextCol = LEAD_COLS[colIdx + 1] ?? null;
    return `
      <div class="border rounded-xl p-3 space-y-3 ${color} drop-zone transition-all shrink-0 w-56" data-status="${col}">
        <div class="flex items-center justify-between">
          <span class="text-xs font-semibold uppercase tracking-wide text-gray-600">${label}</span>
          <span class="badge ${badge}">${group.length}</span>
        </div>
        ${group.map(l => {
          const todayStr = new Date().toISOString().slice(0, 10);
          const fu = l.followUpDate;
          const fuOverdue = fu && fu < todayStr;
          const fuToday   = fu && fu === todayStr;
          const fuLabel   = fu
            ? (fuOverdue ? `<span class="text-red-600 font-medium">Overdue · ${fmtDate(fu)}</span>`
             : fuToday   ? `<span class="text-orange-600 font-medium">Today</span>`
                          : `<span class="text-blue-600">Follow-up ${fmtDate(fu)}</span>`)
            : '';
          return `
          <div class="bg-white rounded-lg border-l-4 ${fuOverdue ? 'border-l-red-500' : fuToday ? 'border-l-orange-400' : 'border-l-gray-200'} border border-gray-200 p-3 shadow-sm space-y-1.5 cursor-grab hover:shadow-md transition-shadow btn-view-lead" data-id="${l.id}" draggable="true">
            <div class="font-semibold text-sm text-gray-900">${esc(l.name)}</div>
            ${l.tags?.length ? `<div class="flex flex-wrap gap-1">${l.tags.map(t => tagChip(t)).join('')}</div>` : ''}
            ${l.phone ? `<div class="flex items-center gap-1.5">
              <div class="text-xs text-gray-700 flex items-center gap-1 flex-1"><svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg><a href="tel:${esc(l.phone)}" class="hover:text-brand hover:underline" onclick="event.stopPropagation()">${esc(l.phone)}</a></div>
              ${waBtn(l.phone)}
            </div>` : ''}
            ${l.email ? `<div class="text-xs text-gray-500 flex items-center gap-1 min-w-0"><svg class="w-3 h-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg><a href="mailto:${esc(l.email)}" class="truncate hover:text-brand hover:underline" onclick="event.stopPropagation()">${esc(l.email)}</a></div>` : ''}
            <div class="text-xs text-gray-400">${esc(l.source)}</div>
            ${fu ? `<div class="text-xs font-medium">${fuLabel}</div>` : ''}
            ${l.trialDate ? (() => {
              const td = l.trialDate;
              const tp = td < new Date().toISOString().slice(0,10);
              const tt = td === new Date().toISOString().slice(0,10);
              return `<div class="text-xs font-medium ${tt ? 'text-green-600' : tp ? 'text-gray-400' : 'text-blue-600'}">🎯 ${tt ? 'Trial today' : tp ? 'Trial was ' + fmtDate(td) : 'Trial ' + fmtDate(td)}</div>`;
            })() : ''}
            ${l.notes ? `<div class="text-xs text-gray-400 line-clamp-2 border-t border-gray-50 pt-1.5">${esc(l.notes)}</div>` : ''}
            <div class="flex justify-between pt-1 border-t border-gray-100 mt-0.5">
              ${prevCol
                ? `<button class="btn-move-lead text-gray-400 hover:text-brand text-xs py-0.5 px-1 rounded hover:bg-gray-100 transition-colors" data-id="${l.id}" data-status="${prevCol}" title="${LEAD_COL_META[prevCol].label}" onclick="event.stopPropagation()">← ${LEAD_COL_META[prevCol].label}</button>`
                : '<span></span>'}
              ${nextCol
                ? `<button class="btn-move-lead text-gray-400 hover:text-brand text-xs py-0.5 px-1 rounded hover:bg-gray-100 transition-colors" data-id="${l.id}" data-status="${nextCol}" title="${LEAD_COL_META[nextCol].label}" onclick="event.stopPropagation()">${LEAD_COL_META[nextCol].label} →</button>`
                : ''}
            </div>
          </div>`;
        }).join('') || '<div class="text-xs text-gray-400 text-center py-2">Empty</div>'}
      </div>`;
  }).join('');
}

function renderMobileList(list, status) {
  const colIdx = LEAD_COLS.indexOf(status);
  const prevCol = LEAD_COLS[colIdx - 1] ?? null;
  const nextCol = LEAD_COLS[colIdx + 1] ?? null;
  const group = list.filter(l => l.status === status).sort((a, b) => (b.createdAt ?? '').localeCompare(a.createdAt ?? ''));
  if (!group.length) return '<div class="text-center text-gray-400 text-sm py-10">No leads in this stage</div>';
  const todayStr = new Date().toISOString().slice(0, 10);
  return group.map(l => {
    const fu = l.followUpDate;
    const fuOverdue = fu && fu < todayStr;
    const fuToday   = fu && fu === todayStr;
    return `
    <div class="bg-white rounded-xl border-l-4 ${fuOverdue ? 'border-l-red-500' : fuToday ? 'border-l-orange-400' : 'border-l-gray-200'} border border-gray-200 p-4 shadow-sm space-y-2 btn-view-lead cursor-pointer" data-id="${l.id}">
      <div class="flex items-start justify-between gap-2">
        <div class="min-w-0">
          <div class="font-semibold text-gray-900">${esc(l.name)}</div>
          <div class="text-xs text-gray-400 mt-0.5">${esc(l.source)}</div>
        </div>
        <div class="flex gap-1 shrink-0">
          ${prevCol ? `<button class="btn-move-lead text-gray-400 hover:text-brand text-xs px-2 py-1 rounded border border-gray-200 hover:border-brand transition-colors" data-id="${l.id}" data-status="${prevCol}" onclick="event.stopPropagation()" title="${LEAD_COL_META[prevCol].label}">←</button>` : ''}
          ${nextCol ? `<button class="btn-move-lead text-gray-400 hover:text-brand text-xs px-2 py-1 rounded border border-gray-200 hover:border-brand transition-colors" data-id="${l.id}" data-status="${nextCol}" onclick="event.stopPropagation()" title="${LEAD_COL_META[nextCol].label}">→</button>` : ''}
        </div>
      </div>
      ${l.tags?.length ? `<div class="flex flex-wrap gap-1">${l.tags.map(t => tagChip(t)).join('')}</div>` : ''}
      <div class="flex flex-wrap gap-3 text-sm">
        ${l.phone ? `<a href="tel:${esc(l.phone)}" class="text-brand text-sm" onclick="event.stopPropagation()">${esc(l.phone)}</a>` : ''}
        ${fu ? `<span class="text-xs font-medium ${fuOverdue ? 'text-red-600' : fuToday ? 'text-orange-600' : 'text-blue-600'}">${fuOverdue ? 'Overdue · ' + fmtDate(fu) : fuToday ? 'Today' : 'Follow-up · ' + fmtDate(fu)}</span>` : ''}
        ${l.trialDate ? `<span class="text-xs font-medium ${l.trialDate === todayStr ? 'text-green-600' : l.trialDate < todayStr ? 'text-gray-400' : 'text-blue-600'}">🎯 ${l.trialDate === todayStr ? 'Trial today' : fmtDate(l.trialDate)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

  const sorted = [...checkinList].sort((a, b) => b.checkedInAt.localeCompare(a.checkedInAt));

  return `

        <div>
          <h1 class="text-2xl font-bold text-gray-900">Check-ins</h1>

              return `

                  <td class="px-4 py-3 font-medium">${m ? esc(m.name) : '<span class="text-gray-400">Unknown</span>'}</td>
                  <td class="px-4 py-3 text-gray-500">${m ? esc(m.membershipType) : '—'}</td>

// ── Backup & Restore ──────────────────────────────────────────────────────

// ── Duplicate detection ────────────────────────────────────────────────────
function normPhone(p) { return (p ?? '').replace(/\D/g, ''); }
function normEmail(e) { return (e ?? '').toLowerCase().trim(); }

function findDuplicate(candidate, existingLeads) {
  const email = normEmail(candidate.email);
  const phone = normPhone(candidate.phone);
  return existingLeads.find(l =>
    (email && normEmail(l.email) === email) ||
    (phone.length >= 7 && normPhone(l.phone) === phone)
  ) ?? null;
}

// ── Google Sheet sync ──────────────────────────────────────────────────────
const SHEET_URL_KEY = 'cfb_sheet_url';

// ── WhatsApp templates ─────────────────────────────────────────────────────
const TEMPLATES_KEY = 'cfb_wa_templates';
const DEFAULT_TEMPLATES = {
  message1:     "Hi {{name}}! 👋 I saw you were interested in CrossFit Barnsley. We'd love to have you in for a free taster session — when are you free this week? 💪",
  message2:     "Hey {{name}}, just following up on my last message! We've got some great class times available and would love to get you in. Any questions at all just ask 🏋️",
  last_message: "Hi {{name}}, I don't want to keep bothering you but I wanted to reach out one last time. Whenever you're ready to start your CrossFit journey, we'll be here for you at CrossFit Barnsley 💙",
};
function getTemplates() {
  try { return { ...DEFAULT_TEMPLATES, ...JSON.parse(localStorage.getItem(TEMPLATES_KEY) ?? '{}') }; }
  catch { return { ...DEFAULT_TEMPLATES }; }
}
function applyTemplate(template, lead) {
  const firstName = (lead.name ?? '').split(' ')[0];
  return template.replace(/\{\{name\}\}/gi, firstName);
}
function waTemplateLink(phone, message) {
  const link = waLink(phone);
  if (!link) return null;
  return `${link}&text=${encodeURIComponent(message)}`;
}

function toSheetCsvUrl(raw) {
  const url = raw.trim();
  // Already a published CSV URL
  if (url.includes('/pub') && url.includes('output=csv')) return url;
  // Already an export CSV URL
  if (url.includes('/export') && url.includes('format=csv')) return url;
  // Regular edit / view / share URL — extract sheet ID and convert
  const idMatch = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
  if (idMatch) {
    const gidMatch = url.match(/[#&?]gid=(\d+)/);
    const gid = gidMatch ? `&gid=${gidMatch[1]}` : '';
    return `https://docs.google.com/spreadsheets/d/${idMatch[1]}/pub?output=csv${gid}`;
  }
  return url;
}

async function syncLeadsFromUrl(url) {
  const csvUrl = toSheetCsvUrl(url);
  let text;
  try {
    const res = await fetch(csvUrl);
    if (res.status === 401 || res.status === 403) {
      showToast('Access denied — make sure the sheet is published publicly (File → Share → Publish to web → CSV)');
      return;
    }
    if (!res.ok) {
      showToast(`Sheet returned an error (${res.status}) — check the URL is correct`);
      return;
    }
    text = await res.text();
  } catch (err) {
    const msg = (err?.message ?? '').toLowerCase();
    if (msg.includes('failed to fetch') || msg.includes('networkerror') || msg.includes('load')) {
      showToast('Could not reach the sheet — if the app is open as a local file (file://) try using the ↑ Import button and upload a CSV instead');
    } else {
      showToast(`Sync failed: ${err?.message ?? 'unknown error'}`);
    }
    return;
  }

  const { headers, rows } = parseCSV(text);
  if (!headers.length) { showToast('Could not read CSV from the sheet'); return; }

  const colMap = detectLeadColumns(headers);
  if (!colMap.name) { showToast('No "name" column found in the sheet'); return; }

  const existing = await Leads.list();
  const validStatuses = new Set(LEAD_COLS);
  let added = 0, skipped = 0;

  for (const r of rows) {
    const name = (colMap.name ? r[colMap.name] : '').trim();
    if (!name) continue;
    const candidate = {
      name,
      email:  (colMap.email  ? r[colMap.email]  : '').trim(),
      phone:  (colMap.phone  ? r[colMap.phone]  : '').trim(),
      source: (colMap.source ? r[colMap.source] : 'Other').trim() || 'Other',
      status: validStatuses.has((colMap.status ? r[colMap.status] : '').toLowerCase().trim())
                ? (colMap.status ? r[colMap.status] : 'new').toLowerCase().trim() : 'new',
      notes:  (colMap.notes  ? r[colMap.notes]  : '').trim(),
    };
    if (findDuplicate(candidate, existing)) { skipped++; continue; }
    await Leads.save(candidate);
    existing.push(candidate); // prevent intra-batch dupes
    added++;
  }

  showToast(`✓ Sync complete — ${added} added, ${skipped} duplicate${skipped !== 1 ? 's' : ''} skipped`);
  render();
}

async function backupAll() {
  const [members, leads, leadActivities, checkins, notes] = await Promise.all([
    _all('members'), _all('leads'), _all('leadActivities'), _all('checkins'), _all('notes')
  ]);
  const payload = JSON.stringify({ version: 2, exportedAt: new Date().toISOString(), members, leads, leadActivities, checkins, notes }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cfb-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

async function restoreAll(json) {
  const data = JSON.parse(json);
  const stores = ['members','leads','leadActivities','checkins','notes'];
  // Clear all stores then re-populate
  await Promise.all(stores.map(s => new Promise((res, rej) => {
    const r = _db.transaction(s, 'readwrite').objectStore(s).clear();
    r.onsuccess = res; r.onerror = rej;
  })));
  for (const s of stores) {
    const rows = data[s] ?? [];
    for (const row of rows) await _put(s, row);
  }
}

async function weeklySummaryModal() {
  // Week bounds: Monday 00:00 → Sunday 23:59
  const now = new Date();
  const dow = now.getDay();
  const mondayOffset = dow === 0 ? -6 : 1 - dow;
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() + mondayOffset);
  weekStart.setHours(0, 0, 0, 0);
  const weekEnd = new Date(weekStart);
  weekEnd.setDate(weekStart.getDate() + 6);
  weekEnd.setHours(23, 59, 59, 999);

  const weekStartStr = weekStart.toISOString().slice(0, 10);
  const weekEndStr   = weekEnd.toISOString().slice(0, 10);
  const weekStartISO = weekStart.toISOString();

  const [leads, members, activities] = await Promise.all([
    Leads.list(), Members.list(), _all('leadActivities')
  ]);

  // New leads added this week
  const newLeads = leads.filter(l => l.createdAt >= weekStartISO);

  // Trials held or booked this week
  const trialsThisWeek = leads.filter(l => l.trialDate >= weekStartStr && l.trialDate <= weekEndStr);
  const trialsPast     = trialsThisWeek.filter(l => l.trialDate <= now.toISOString().slice(0, 10));
  const trialsFuture   = trialsThisWeek.filter(l => l.trialDate > now.toISOString().slice(0, 10));

  // Conversions: members who joined this week
  const newMembers = members.filter(m => m.createdAt >= weekStartISO);

  // Activities logged this week
  const weekActivities = activities.filter(a => a.createdAt >= weekStartISO);
  const actByType = {};
  for (const a of weekActivities) actByType[a.type] = (actByType[a.type] ?? 0) + 1;

  // Pipeline snapshot
  const byStatus = Object.fromEntries(LEAD_COLS.map(s => [s, 0]));
  for (const l of leads) if (byStatus[l.status] !== undefined) byStatus[l.status]++;

  // Source breakdown for new leads
  const bySource = {};
  for (const l of newLeads) bySource[l.source] = (bySource[l.source] ?? 0) + 1;

  const weekLabel = `${weekStart.toLocaleDateString('en-GB', { day:'numeric', month:'short' })} – ${weekEnd.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' })}`;
  const typeIcons = { Call:'📞', WhatsApp:'💬', Email:'📧', Meeting:'🤝', Trial:'✅', Note:'📝' };

  function section(title, count, badge, body) {
    return `
      <div class="border-b border-gray-100 px-6 py-4">
        <div class="flex items-center justify-between mb-3">
          <h3 class="font-semibold text-sm text-gray-800">${title}</h3>
          <span class="badge ${badge}">${count}</span>
        </div>
        ${body}
      </div>`;
  }

  modal(`
    <div class="modal max-w-lg">
      <div class="px-6 py-5 border-b border-gray-100 flex items-center justify-between">
        <div>
          <h2 class="text-lg font-semibold">Weekly Summary</h2>
          <p class="text-xs text-gray-400 mt-0.5">${weekLabel}</p>
        </div>
        <div class="flex gap-2">
          <button id="btn-copy-summary" class="btn-ghost text-xs">Copy</button>
          <button id="btn-modal-close" class="btn-ghost text-xs">Close</button>
        </div>
      </div>

      <div class="overflow-y-auto max-h-[70vh]">

        ${section('New Leads', newLeads.length, newLeads.length ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-500',
          newLeads.length
            ? `<div class="space-y-1">
                ${newLeads.map(l => `
                  <div class="flex items-center justify-between text-sm">
                    <span class="font-medium">${esc(l.name)}</span>
                    <span class="text-xs text-gray-400">${esc(l.source)}</span>
                  </div>`).join('')}
               </div>
               ${Object.keys(bySource).length > 1 ? `<div class="mt-2 flex flex-wrap gap-1">${Object.entries(bySource).map(([s,n]) => `<span class="badge bg-gray-100 text-gray-600">${esc(s)}: ${n}</span>`).join('')}</div>` : ''}`
            : '<p class="text-sm text-gray-400">No new leads this week.</p>'
        )}

        ${section('Trials', trialsThisWeek.length, trialsThisWeek.length ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500',
          trialsThisWeek.length
            ? `<div class="space-y-1">
                ${trialsPast.map(l => `
                  <div class="flex items-center justify-between text-sm">
                    <span class="font-medium">${esc(l.name)}</span>

                  </div>`).join('')}

        )}

        ${section('Converted to Members', newMembers.length, newMembers.length ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500',
          newMembers.length
            ? `<div class="space-y-1">
                ${newMembers.map(m => `
                  <div class="flex items-center justify-between text-sm">
                    <span class="font-medium">${esc(m.name)}</span>
                    <span class="text-xs text-gray-400">${esc(m.membershipType)}</span>

        )}

          weekActivities.length
            ? `<div class="flex flex-wrap gap-2">
                ${Object.entries(actByType).sort((a,b) => b[1]-a[1]).map(([type, n]) =>

                ).join('')}

            : '<p class="text-sm text-gray-400">No activity logged this week.</p>'

        <!-- Pipeline snapshot -->

        </div>

      </div>
    </div>`);

  document.getElementById('btn-modal-close').addEventListener('click', closeModal);

  document.getElementById('btn-copy-summary').addEventListener('click', () => {
    const lines = [
      `CrossFit Barnsley — Weekly Summary`,
      `${weekLabel}`,
      ``,
      `New Leads: ${newLeads.length}`,
      ...newLeads.map(l => `  • ${l.name} (${l.source})`),
      ``,
      `Trials: ${trialsThisWeek.length}`,
      ...trialsPast.map(l => `  • ${l.name} — ${fmtDate(l.trialDate)}${l.status === 'converted' ? ' ✓ Converted' : ''}`),

      ``,
      `New Members: ${newMembers.length}`,
      ...newMembers.map(m => `  • ${m.name} (${m.membershipType})`),
      ``,
      `Activity Logged: ${weekActivities.length}`,
      ...Object.entries(actByType).map(([t, n]) => `  • ${t}: ${n}`),
      ``,
      `Pipeline: ${LEAD_COLS.map(s => `${LEAD_COL_META[s].label} ${byStatus[s]}`).join(' · ')}`,
    ];
    navigator.clipboard.writeText(lines.join('\n'))
      .then(() => showToast('✓ Summary copied to clipboard'))
      .catch(() => showToast('Could not copy — try manually'));
  });
}

// ══════════════════════════════════════════════ EVENT HANDLERS ═══════════
function attachHandlers(page) {
  const content = document.getElementById('page-content');

  // Close modal on escape
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  }, { once: true });

  // ── Dashboard ──
  if (page === 'dashboard') {
    const widget = content.querySelector('#quick-checkin-widget');
    const input  = content.querySelector('#checkin-search');
    const results = content.querySelector('#checkin-results');
    const membersList = JSON.parse(widget.dataset.members);

    input.addEventListener('input', () => {
      const q = input.value.toLowerCase().trim();
      if (!q) { results.innerHTML = ''; return; }
      const matches = membersList.filter(m => m.name.toLowerCase().includes(q)).slice(0, 6);
      results.innerHTML = matches.length
        ? matches.map(m => `
            <div class="flex items-center justify-between px-3 py-2 rounded-lg hover:bg-gray-50 border border-gray-100">
              <div>
                <span class="text-sm font-medium">${esc(m.name)}</span>
                <span class="text-xs text-gray-400 ml-2">${esc(m.membershipType)}</span>
              </div>
              <button class="btn-primary text-xs py-1 px-3 btn btn-do-checkin" data-id="${m.id}" data-name="${esc(m.name)}">
                Check in
              </button>
            </div>`).join('')
        : '<p class="text-sm text-gray-400 px-1">No active members match.</p>';

      results.querySelectorAll('.btn-do-checkin').forEach(btn => {
        btn.addEventListener('click', async () => {
          await Checkins.add(Number(btn.dataset.id));
          showToast(`✓ ${btn.dataset.name} checked in`);
          input.value = '';
          results.innerHTML = '';
          input.focus();
        });
      });
    });

    input.focus();

    content.querySelector('#btn-weekly-summary')?.addEventListener('click', () => weeklySummaryModal());

    // Follow-up row clicks on dashboard → open lead detail
    content.querySelectorAll('.btn-open-lead').forEach(btn => {
      btn.addEventListener('click', async () => {
        const lead = await Leads.get(Number(btn.dataset.id));
        if (lead) { await leadDetailModal(lead); attachLeadDetailHandlers(lead); }
      });
    });

    return;
  }

  // ── Members ──
  if (page === 'members') {
    content.querySelector('#btn-export-members')?.addEventListener('click', async () => {
      const list = await Members.list();
      const csv = toCSV(list, [
        { label: 'Name',            get: m => m.name },
        { label: 'Phone',           get: m => m.phone },
        { label: 'Email',           get: m => m.email },
        { label: 'Membership Type', get: m => m.membershipType },
        { label: 'Status',          get: m => m.status },
        { label: 'Joined Date',     get: m => m.joinedDate },
      ]);
      const date = new Date().toISOString().slice(0, 10);
      downloadCSV(`cfb-members-${date}.csv`, csv);
    });

    content.querySelector('#btn-add-member')?.addEventListener('click', () => memberFormModal());

    // Search & filter
    function filterMembers() {
      const search = content.querySelector('#member-search').value.toLowerCase();
      const status = content.querySelector('#member-filter-status').value;
      Members.list().then(list => {
        const filtered = list.filter(m => {
          const matchSearch = !search || m.name.toLowerCase().includes(search) || m.email.toLowerCase().includes(search);
          const matchStatus = !status || m.status === status;
          return matchSearch && matchStatus;
        });
        content.querySelector('#members-tbody').innerHTML = renderMemberRows(filtered);
        attachMemberRowHandlers();
      });
    }
    content.querySelector('#member-search').addEventListener('input', filterMembers);
    content.querySelector('#member-filter-status').addEventListener('change', filterMembers);
    attachMemberRowHandlers();
  }

  // ── Leads ──
  if (page === 'leads') {
    content.querySelector('#btn-sync-sheet')?.addEventListener('click', async (e) => {
      const url = localStorage.getItem(SHEET_URL_KEY);
      if (!url) return;
      e.target.textContent = '⟳ Syncing…';
      e.target.disabled = true;
      await syncLeadsFromUrl(url);
    });

    content.querySelector('#btn-add-lead')?.addEventListener('click', () => {
      leadFormModal();
      attachLeadFormHandlers();
    });

    content.querySelector('#btn-import-leads')?.addEventListener('click', () => {
      importLeadsModal();
      let parsedRows = [], colMap = {};

      function showPreview(text) {
        const { headers, rows } = parseCSV(text);
        if (!headers.length) { showToast('Could not read CSV — check the format'); return; }

        colMap = detectLeadColumns(headers);

        // Column mapping summary
        const fields = { name:'Name', email:'Email', phone:'Phone', source:'Source', status:'Status', notes:'Notes' };
        const mapHtml = Object.entries(fields).map(([k, label]) =>
          colMap[k]
            ? `<div class="flex gap-1"><span class="font-medium">${label}:</span><span class="text-gray-500">"${colMap[k]}" column</span></div>`
            : `<div class="flex gap-1"><span class="font-medium">${label}:</span><span class="text-gray-400 italic">not found${k === 'name' ? ' ⚠️ required' : ''}</span></div>`
        ).join('');
        document.getElementById('import-col-map').innerHTML = mapHtml;

        // Preview table (first 5 rows)
        parsedRows = rows.filter(r => colMap.name && r[colMap.name]?.trim());
        const preview = parsedRows.slice(0, 5);
        const tableHtml = `
          <table class="w-full text-xs">
            <thead><tr class="bg-gray-50 text-gray-500">
              <th class="px-3 py-2 text-left">Name</th>
              <th class="px-3 py-2 text-left">Email</th>
              <th class="px-3 py-2 text-left">Phone</th>
              <th class="px-3 py-2 text-left">Source</th>
              <th class="px-3 py-2 text-left">Status</th>
            </tr></thead>
            <tbody class="divide-y divide-gray-100">
              ${preview.map(r => `<tr>
                <td class="px-3 py-2 font-medium">${esc(r[colMap.name] ?? '')}</td>
                <td class="px-3 py-2 text-gray-500">${esc(colMap.email ? r[colMap.email] : '')}</td>
                <td class="px-3 py-2 text-gray-500">${esc(colMap.phone ? r[colMap.phone] : '')}</td>
                <td class="px-3 py-2 text-gray-500">${esc(colMap.source ? r[colMap.source] : '')}</td>
                <td class="px-3 py-2 text-gray-500">${esc(colMap.status ? r[colMap.status] : 'new')}</td>
              </tr>`).join('')}
            </tbody>
          </table>`;
        document.getElementById('import-table-wrap').innerHTML = tableHtml;
        document.getElementById('import-count').textContent =
          `${parsedRows.length} lead${parsedRows.length !== 1 ? 's' : ''} ready to import${parsedRows.length < rows.length ? ` (${rows.length - parsedRows.length} skipped — missing name)` : ''}.`;
        document.getElementById('import-preview').classList.remove('hidden');
        document.getElementById('btn-confirm-import').classList.remove('hidden');
      }

      // Tab switching
      document.getElementById('tab-file').addEventListener('click', () => {
        document.getElementById('tab-file').className = 'flex-1 py-2 bg-brand text-white transition-colors';
        document.getElementById('tab-url').className  = 'flex-1 py-2 text-gray-600 hover:bg-gray-50 transition-colors';
        document.getElementById('import-file-section').classList.remove('hidden');
        document.getElementById('import-url-section').classList.add('hidden');
      });
      document.getElementById('tab-url').addEventListener('click', () => {
        document.getElementById('tab-url').className  = 'flex-1 py-2 bg-brand text-white transition-colors';
        document.getElementById('tab-file').className = 'flex-1 py-2 text-gray-600 hover:bg-gray-50 transition-colors';
        document.getElementById('import-url-section').classList.remove('hidden');
        document.getElementById('import-file-section').classList.add('hidden');
      });

      // File upload
      document.getElementById('import-file').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = ev => showPreview(ev.target.result);
        reader.readAsText(file);
      });

      // Google Sheets URL fetch
      document.getElementById('btn-load-url').addEventListener('click', async () => {
        const url = document.getElementById('import-url').value.trim();
        if (!url) return;
        try {
          document.getElementById('btn-load-url').textContent = 'Loading…';
          const res = await fetch(url);
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          showPreview(await res.text());
        } catch (err) {
          showToast('Failed to load sheet — make sure it is published as CSV');
        } finally {
          document.getElementById('btn-load-url').textContent = 'Load Sheet';
        }
      });

      // Confirm import
      document.getElementById('btn-confirm-import').addEventListener('click', async () => {
        const validStatuses = new Set(LEAD_COLS);
        const existing = await Leads.list();
        let added = 0, dupes = 0;
        for (const r of parsedRows) {
          const rawStatus = (colMap.status ? r[colMap.status] : '').toLowerCase().trim();
          const candidate = {
            name:   (colMap.name   ? r[colMap.name]   : '').trim(),
            email:  (colMap.email  ? r[colMap.email]  : '').trim(),
            phone:  (colMap.phone  ? r[colMap.phone]  : '').trim(),
            source: (colMap.source ? r[colMap.source] : 'Other').trim() || 'Other',
            status: validStatuses.has(rawStatus) ? rawStatus : 'new',
            notes:  (colMap.notes  ? r[colMap.notes]  : '').trim(),
          };
          if (findDuplicate(candidate, existing)) { dupes++; continue; }
          await Leads.save(candidate);
          existing.push(candidate);
          added++;
        }
        showToast(`✓ ${added} imported${dupes ? `, ${dupes} duplicate${dupes !== 1 ? 's' : ''} skipped` : ''}`);
        closeModal();
        render();
      });

      document.getElementById('btn-modal-close').addEventListener('click', closeModal);
    });

    // ── Search / filter ──
    let dragId = null;

    function attachKanbanHandlers() {
      content.querySelectorAll('.btn-view-lead').forEach(card => {
        card.addEventListener('dragstart', (e) => {
          dragId = card.dataset.id;
          e.dataTransfer.effectAllowed = 'move';
          setTimeout(() => card.classList.add('opacity-40'), 0);
        });
        card.addEventListener('dragend', () => card.classList.remove('opacity-40'));
        card.addEventListener('click', async () => {
          document.querySelectorAll('.card-pressed').forEach(el => el.classList.remove('card-pressed'));
          card.classList.add('card-pressed');
          const lead = await Leads.get(Number(card.dataset.id));
          if (lead) await openLeadDrawer(lead);
        });
      });

      content.querySelectorAll('.drop-zone').forEach(zone => {
        zone.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          zone.classList.add('ring-2', 'ring-brand', 'ring-offset-1');
        });
        zone.addEventListener('dragleave', (e) => {
          if (!zone.contains(e.relatedTarget))
            zone.classList.remove('ring-2', 'ring-brand', 'ring-offset-1');
        });
        zone.addEventListener('drop', async (e) => {
          e.preventDefault();
          zone.classList.remove('ring-2', 'ring-brand', 'ring-offset-1');
          if (!dragId) return;
          const newStatus = zone.dataset.status;
          const lead = await Leads.get(Number(dragId));
          if (lead && lead.status !== newStatus) {
            await Leads.save({ ...lead, status: newStatus });
            showToast(`${lead.name} → ${newStatus}`);
            render();
          }
          dragId = null;
        });
      });

      content.querySelectorAll('.btn-move-lead').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const lead = await Leads.get(Number(btn.dataset.id));
          if (!lead) return;
          const newStatus = btn.dataset.status;
          await Leads.save({ ...lead, status: newStatus });
          showToast(`${lead.name} → ${LEAD_COL_META[newStatus].label}`);
          filterLeads();
        });
      });
    }

    async function filterLeads() {
      const q   = content.querySelector('#leads-search').value.toLowerCase().trim();
      const src = content.querySelector('#leads-filter-source').value;
      const all = await Leads.list();
      const filtered = all.filter(l => {
        const matchQ   = !q   || l.name.toLowerCase().includes(q) || (l.phone||'').includes(q) || (l.email||'').toLowerCase().includes(q);
        const matchSrc = !src || l.source === src;
        return matchQ && matchSrc;
      });
      content.querySelector('#leads-kanban').innerHTML = renderKanban(filtered);
      // Also update mobile list for whichever tab is active
      const activeTab = content.querySelector('.mobile-status-tab.tab-active');
      const mobileList = content.querySelector('#mobile-leads-list');
      if (activeTab && mobileList) {
        mobileList.innerHTML = renderMobileList(filtered, activeTab.dataset.status);
      }
      attachKanbanHandlers();
    }

    content.querySelector('#leads-search').addEventListener('input', filterLeads);
    content.querySelector('#leads-filter-source').addEventListener('change', filterLeads);

    // Mobile status tab switching
    content.querySelectorAll('.mobile-status-tab').forEach(tab => {
      tab.addEventListener('click', async () => {
        content.querySelectorAll('.mobile-status-tab').forEach(t => {
          t.classList.remove('bg-brand', 'text-white', 'tab-active');
          t.classList.add('bg-gray-100', 'text-gray-600');
        });
        tab.classList.add('bg-brand', 'text-white', 'tab-active');
        tab.classList.remove('bg-gray-100', 'text-gray-600');
        const q   = content.querySelector('#leads-search').value.toLowerCase().trim();
        const src = content.querySelector('#leads-filter-source').value;
        const all = await Leads.list();
        const filtered = all.filter(l => {
          const matchQ   = !q || l.name.toLowerCase().includes(q) || (l.phone||'').includes(q) || (l.email||'').toLowerCase().includes(q);
          const matchSrc = !src || l.source === src;
          return matchQ && matchSrc;
        });
        content.querySelector('#mobile-leads-list').innerHTML = renderMobileList(filtered, tab.dataset.status);
        attachKanbanHandlers();
      });
    });

    attachKanbanHandlers();
  }

  // ── Check-ins ──
  if (page === 'checkins') {
    content.querySelector('#btn-add-checkin')?.addEventListener('click', async () => {
      const list = await Members.list();
      checkinModal(list.filter(m => m.status === 'active'));
      document.getElementById('checkin-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const fd = new FormData(e.target);
        const memberId = Number(fd.get('memberId'));
        if (!memberId) return;
        await Checkins.add(memberId);
        closeModal();
        render();
      });
      document.getElementById('btn-modal-close').addEventListener('click', closeModal);
    });

    content.querySelector('#btn-export-checkins')?.addEventListener('click', async () => {
      const [memberList, checkinList] = await Promise.all([Members.list(), Checkins.list()]);
      const memberMap = Object.fromEntries(memberList.map(m => [m.id, m]));
      const sorted = [...checkinList].sort((a, b) => b.checkedInAt.localeCompare(a.checkedInAt));
      const csv = toCSV(sorted, [
        { label: 'Member Name',     get: c => memberMap[c.memberId]?.name ?? '' },
        { label: 'Membership Type', get: c => memberMap[c.memberId]?.membershipType ?? '' },
        { label: 'Date',            get: c => new Date(c.checkedInAt).toLocaleDateString('en-GB') },
        { label: 'Time',            get: c => new Date(c.checkedInAt).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }) },
      ]);
      const date = new Date().toISOString().slice(0, 10);
      downloadCSV(`cfb-checkins-${date}.csv`, csv);
    });

    content.querySelectorAll('.btn-delete-checkin').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (confirm('Delete this check-in?')) {
          await Checkins.delete(Number(btn.dataset.id));
          render();
        }
      });
    });
  }
}

function attachMemberRowHandlers() {
  const content = document.getElementById('page-content');

  content.querySelectorAll('.btn-view-member').forEach(btn => {
    btn.addEventListener('click', async () => {
      await openMemberView(Number(btn.dataset.id));
      attachMemberViewHandlers();
    });
  });

  content.querySelectorAll('.btn-edit-member').forEach(btn => {
    btn.addEventListener('click', async () => {
      const m = await Members.get(Number(btn.dataset.id));
      if (m) { memberFormModal(m); attachMemberFormHandlers(m.id); }
    });
  });
}

function attachMemberViewHandlers() {
  document.getElementById('btn-modal-edit-member')?.addEventListener('click', async (e) => {
    const m = await Members.get(Number(e.target.dataset.id));
    if (m) { memberFormModal(m); attachMemberFormHandlers(m.id); }
  });

  document.getElementById('btn-modal-delete-member')?.addEventListener('click', async (e) => {
    const m = await Members.get(Number(e.target.dataset.id));
    if (m && confirm(`Delete ${m.name}? This cannot be undone.`)) {
      await Members.delete(m.id);
      closeModal();
      render();
    }
  });

  document.getElementById('btn-quick-checkin')?.addEventListener('click', async (e) => {
    const id = Number(e.target.dataset.id);
    await Checkins.add(id);
    await openMemberView(id);
    attachMemberViewHandlers();
  });

  document.getElementById('btn-save-note')?.addEventListener('click', async (e) => {
    const id = Number(e.target.dataset.id);
    const input = document.getElementById('new-note-input');
    const content = input.value.trim();
    if (!content) return;
    await Notes.add(id, content);
    input.value = '';
    await openMemberView(id);
    attachMemberViewHandlers();
  });

  document.getElementById('btn-modal-close')?.addEventListener('click', closeModal);
}

function attachMemberFormHandlers(existingId) {
  document.getElementById('member-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const record = {
      ...(existingId ? { id: existingId } : {}),
      name:           fd.get('name'),
      phone:          fd.get('phone'),
      email:          fd.get('email'),
      membershipType: fd.get('membershipType'),
      status:         fd.get('status'),
      joinedDate:     fd.get('joinedDate'),
    };
    await Members.save(record);
    closeModal();
    render();
  });

  document.getElementById('btn-delete-member')?.addEventListener('click', async (e) => {
    if (confirm('Delete this member? This cannot be undone.')) {
      await Members.delete(Number(e.target.dataset.id));
      closeModal();
      render();
    }
  });

  document.getElementById('btn-modal-close')?.addEventListener('click', closeModal);
}

function attachLeadDetailHandlers(lead) {
  let selectedType = 'Call';

  // Activity type pills
  document.querySelectorAll('.btn-activity-type').forEach(btn => {
    if (btn.dataset.type === selectedType) btn.classList.add('border-brand', 'text-brand');
    btn.addEventListener('click', () => {
      selectedType = btn.dataset.type;
      document.querySelectorAll('.btn-activity-type').forEach(b => {
        b.classList.toggle('border-brand', b.dataset.type === selectedType);
        b.classList.toggle('text-brand',   b.dataset.type === selectedType);
      });
    });
  });

  // Log activity
  document.getElementById('btn-log-activity')?.addEventListener('click', async () => {
    const input = document.getElementById('activity-input');
    const content = input.value.trim();
    if (!content) return;
    await LeadActivities.add(lead.id, selectedType, content);
    const updated = await Leads.get(lead.id);
    await leadDetailModal(updated);
    attachLeadDetailHandlers(updated);
  });

  // Save follow-up date
  document.getElementById('btn-save-followup')?.addEventListener('click', async () => {
    const date = document.getElementById('followup-date-input').value;
    await Leads.save({ ...lead, followUpDate: date });
    const updated = await Leads.get(lead.id);
    await leadDetailModal(updated);
    attachLeadDetailHandlers(updated);
    showToast('Follow-up date saved');
  });

  // Clear follow-up date
  document.getElementById('btn-clear-followup')?.addEventListener('click', async () => {
    await Leads.save({ ...lead, followUpDate: '' });
    const updated = await Leads.get(lead.id);
    await leadDetailModal(updated);
    attachLeadDetailHandlers(updated);
  });

  // Save trial date
  document.getElementById('btn-save-trial')?.addEventListener('click', async () => {
    const date = document.getElementById('trial-date-input').value;
    await Leads.save({ ...lead, trialDate: date });
    const updated = await Leads.get(lead.id);
    await leadDetailModal(updated);
    attachLeadDetailHandlers(updated);
    showToast('Trial date saved');
  });

  // Clear trial date
  document.getElementById('btn-clear-trial')?.addEventListener('click', async () => {
    await Leads.save({ ...lead, trialDate: '' });
    const updated = await Leads.get(lead.id);
    await leadDetailModal(updated);
    attachLeadDetailHandlers(updated);
  });

  // Delete activity
  document.querySelectorAll('.btn-delete-activity').forEach(btn => {
    btn.addEventListener('click', async () => {
      await LeadActivities.delete(Number(btn.dataset.id));
      const updated = await Leads.get(lead.id);
      await leadDetailModal(updated);
      attachLeadDetailHandlers(updated);
    });
  });

  // Edit button → swap to edit form
  document.getElementById('btn-lead-edit')?.addEventListener('click', async () => {
    const fresh = await Leads.get(lead.id);
    if (fresh) { leadFormModal(fresh); attachLeadFormHandlers(fresh.id); }
  });

  // Delete button
  document.getElementById('btn-lead-delete')?.addEventListener('click', async () => {
    if (confirm(`Delete ${lead.name}? This cannot be undone.`)) {
      await Leads.delete(lead.id);
      closeModal();
      render();
    }
  });

  document.getElementById('btn-modal-close')?.addEventListener('click', () => {
    closeModal();
    if (currentPage === 'leads' || currentPage === 'dashboard') render();
  });
}

function attachLeadFormHandlers(existingId) {
  document.getElementById('lead-form')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const record = {
      ...(existingId ? { id: existingId } : {}),
      name:         fd.get('name'),
      phone:        fd.get('phone'),
      email:        fd.get('email'),
      source:       fd.get('source'),
      status:       fd.get('status'),
      followUpDate: fd.get('followUpDate'),
      trialDate:    fd.get('trialDate'),
      notes:        fd.get('notes'),
    };
    await Leads.save(record);
    closeModal();
    render();
  });

  document.getElementById('btn-delete-lead')?.addEventListener('click', async (e) => {
    if (confirm('Delete this lead?')) {
      await Leads.delete(Number(e.target.dataset.id));
      closeModal();
      render();
    }
  });

  document.getElementById('btn-convert-lead')?.addEventListener('click', async (e) => {
    const lead = await Leads.get(Number(e.target.dataset.id));
    if (!lead) return;
    convertLeadModal(lead);
    document.getElementById('btn-modal-close').addEventListener('click', closeModal);
    document.getElementById('convert-form').addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const fd = new FormData(ev.target);
      await Members.save({
        name:           fd.get('name'),
        phone:          fd.get('phone'),
        email:          fd.get('email'),
        membershipType: fd.get('membershipType'),
        status:         'active',
        joinedDate:     fd.get('joinedDate'),
      });
      await Leads.save({ ...lead, status: 'converted' });
      closeModal();
      render();
    });
  });

  document.getElementById('btn-modal-close')?.addEventListener('click', closeModal);
}


</script>
